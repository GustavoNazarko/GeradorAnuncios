<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Generator — Carrossel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0F0D1A;
      --bg2:         #1A1629;
      --primary:     #6C3CE1;
      --primary-glow: rgba(108,60,225,.28);
      --secondary:   #A855F7;
      --accent:      #22D3EE;
      --accent-dim:  rgba(34,211,238,.15);
      --accent-border: rgba(34,211,238,.25);
      --surface:     rgba(255,255,255,.04);
      --surface-h:   rgba(255,255,255,.07);
      --border:      rgba(255,255,255,.08);
      --border-focus: rgba(108,60,225,.6);
      --text:        #F0EEF9;
      --text-muted:  rgba(240,238,249,.5);
      --text-dim:    rgba(240,238,249,.28);
      --success:     #22C55E;
      --error:       #EF4444;
      --warning:     #F59E0B;
      --r:           12px;
      --r-sm:        8px;
      --r-lg:        16px;
    }

    html { font-size: 16px; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 24px;
      padding: 0 32px; height: 60px;
      background: rgba(15,13,26,.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 15px; font-weight: 700; letter-spacing: -.3px;
      white-space: nowrap; color: var(--text); flex-shrink: 0;
    }
    .logo span {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav { display: flex; gap: 2px; }
    .nav a {
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      text-decoration: none; padding: 5px 12px; border-radius: var(--r-sm);
      transition: color .15s, background .15s;
    }
    .nav a:hover { color: var(--text); background: var(--surface-h); }
    .nav a.active { color: var(--accent); background: rgba(34,211,238,.08); }

    .api-key-section {
      margin-left: auto; display: flex; align-items: center; gap: 10px;
    }
    .api-key-label {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim); white-space: nowrap;
    }
    .api-key-wrap { position: relative; display: flex; align-items: center; }
    .api-key-input {
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text);
      padding: 6px 32px 6px 10px; width: 240px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .api-key-input::placeholder { color: var(--text-dim); }
    .api-key-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--primary-glow); }
    .api-key-status {
      position: absolute; right: 10px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--error); transition: background .3s;
    }
    .api-key-status.ok { background: var(--success); }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    .main {
      display: grid; grid-template-columns: 420px 1fr;
      gap: 28px; max-width: 1060px;
      margin: 0 auto; padding: 28px 32px 64px;
    }
    @media (max-width: 820px) {
      .main { grid-template-columns: 1fr; }
      .header { padding: 0 16px; }
      .api-key-label { display: none; }
      .api-key-input { width: 160px; }
    }

    /* ── CARD ───────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      backdrop-filter: blur(14px);
      padding: 24px;
    }
    .card-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
      margin-bottom: 20px;
    }

    /* ── FORM ───────────────────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    label {
      display: block; font-size: 11px; font-weight: 500;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
      margin-bottom: 6px;
    }
    input[type="text"], textarea {
      width: 100%;
      background: rgba(0,0,0,.3);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 14px; padding: 10px 12px; outline: none;
      transition: border-color .15s, box-shadow .15s; resize: vertical;
    }
    input[type="text"]::placeholder, textarea::placeholder { color: var(--text-dim); }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--primary-glow);
    }
    textarea { min-height: 78px; font-size: 13px; }

    /* ── MODIFIER ───────────────────────────────────────────── */
    .modifier-details {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      overflow: hidden;
    }
    .modifier-summary {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; cursor: pointer;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-muted); user-select: none; list-style: none;
      transition: background .15s;
    }
    .modifier-summary:hover { background: var(--surface-h); }
    .modifier-summary::-webkit-details-marker { display: none; }
    .modifier-badge {
      margin-left: auto; font-size: 10px;
      padding: 2px 8px; border-radius: 20px; font-weight: 600;
    }
    .badge-ok   { background: rgba(34,197,94,.12); color: var(--success); border: 1px solid rgba(34,197,94,.3); }
    .badge-miss { background: rgba(245,158,11,.12); color: var(--warning); border: 1px solid rgba(245,158,11,.3); }
    .modifier-body { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; }
    .modifier-actions { display: flex; gap: 8px; }
    .btn-sm {
      font-size: 12px; font-weight: 500; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 6px 12px;
      cursor: pointer; transition: background .15s, color .15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-sm:hover { background: var(--surface-h); color: var(--text); }
    #file-dna, #file-img { display: none; }

    /* ── TOGGLE (shared) ────────────────────────────────────── */
    .type-toggle {
      display: flex; border: 1px solid var(--border);
      border-radius: var(--r-sm); overflow: hidden;
    }
    .type-btn {
      flex: 1; padding: 8px 12px; font-size: 13px; font-weight: 500;
      font-family: 'Inter', sans-serif; background: transparent;
      border: none; color: var(--text-muted); cursor: pointer;
      transition: background .15s, color .15s;
    }
    .type-btn.active { background: var(--primary); color: #fff; }
    .type-btn:not(.active):hover { background: var(--surface-h); color: var(--text); }

    /* ── IDEA CHIPS ─────────────────────────────────────────── */
    .ideas-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 8px; min-height: 4px;
    }
    .idea-chip {
      padding: 7px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text-muted);
      font-size: 13px; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background .15s, color .15s, border-color .15s;
      text-align: left; line-height: 1.4;
    }
    .idea-chip:hover { background: var(--surface-h); color: var(--text); }
    .idea-chip.selected {
      background: rgba(108,60,225,.18);
      border-color: var(--primary);
      color: var(--text);
    }
    .btn-ideas {
      width: 100%; padding: 10px 12px; margin-top: 8px;
      background: transparent; border: 1px dashed rgba(255,255,255,.15);
      border-radius: var(--r-sm); color: var(--text-muted);
      font-size: 13px; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background .15s, border-color .15s, color .15s;
    }
    .btn-ideas:hover:not(:disabled) { background: var(--surface-h); border-color: var(--primary); color: var(--text); }
    .btn-ideas:disabled { opacity: .45; cursor: not-allowed; }

    /* ── ATTACH PREVIEW ─────────────────────────────────────── */
    #attach-preview { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    #attach-preview img {
      width: 100%; max-height: 110px; object-fit: cover;
      border-radius: var(--r-sm); border: 1px solid var(--border);
    }
    .source-extra { margin-top: 8px; }

    /* ── GENERATE BUTTON ────────────────────────────────────── */
    .btn-gen {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none; border-radius: var(--r-sm);
      color: #fff; font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-gen:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    .btn-gen:active:not(:disabled) { transform: translateY(0); }
    .btn-gen:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    /* ── PROGRESS ───────────────────────────────────────────── */
    .progress-text {
      margin-top: 10px; min-height: 18px;
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      color: var(--accent); text-align: center;
      transition: opacity .2s;
    }
    .progress-text.hide { opacity: 0; }

    /* ── COST PANEL ─────────────────────────────────────────── */
    .cost-panel {
      margin-top: 16px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px;
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      border-radius: var(--r-sm);
    }
    .cost-label {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em;
    }
    .cost-value {
      font-size: 14px; font-family: 'JetBrains Mono', monospace;
      font-weight: 600; color: var(--accent);
    }

    /* ── PREVIEW COLUMN ─────────────────────────────────────── */
    .preview-col { display: flex; flex-direction: column; gap: 14px; }

    .preview-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); backdrop-filter: blur(14px);
      overflow: hidden;
    }
    .preview-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 20px; border-bottom: 1px solid var(--border);
    }
    .preview-title {
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .slide-counter {
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
    }
    .slide-counter b { color: var(--text); font-weight: 600; }

    /* ── EMPTY STATE ────────────────────────────────────────── */
    .empty-state {
      aspect-ratio: 4/5; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: var(--text-dim); background: #0A0814;
    }
    .empty-state .ico { font-size: 44px; opacity: .35; }
    .empty-state p { font-size: 13px; font-family: 'JetBrains Mono', monospace; }

    /* ── CAROUSEL ───────────────────────────────────────────── */
    #carousel-wrap { display: none; }

    .carousel-vp {
      position: relative; width: 100%; aspect-ratio: 4/5;
      overflow: hidden; background: #080613;
      cursor: grab;
    }
    .carousel-vp.dragging { cursor: grabbing; }

    .carousel-track {
      display: flex; height: 100%;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }

    .c-slide {
      flex: 0 0 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #080613; position: relative; overflow: hidden;
    }
    .c-slide img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; pointer-events: none; user-select: none;
    }

    .slide-spinner {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .slide-spinner p {
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }

    .slide-err {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      padding: 24px; text-align: center;
    }
    .slide-err .ico { font-size: 28px; }
    .slide-err p { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--error); }
    .slide-err small { font-size: 10px; color: var(--text-dim); line-height: 1.4; }

    /* NAV ARROWS */
    .cnav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(15,13,26,.75); border: 1px solid var(--border);
      border-radius: 50%; cursor: pointer; color: var(--text); font-size: 18px;
      backdrop-filter: blur(8px); transition: background .15s, opacity .15s;
      user-select: none; z-index: 10; line-height: 1;
    }
    .cnav:hover { background: rgba(108,60,225,.4); }
    .cnav.hidden { opacity: 0; pointer-events: none; }
    .cnav-prev { left: 10px; }
    .cnav-next { right: 10px; }

    /* FOOTER */
    .carousel-footer {
      padding: 12px 20px; border-top: 1px solid var(--border);
    }
    .seg-bar { display: flex; gap: 4px; }
    .seg {
      flex: 1; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,.08);
      cursor: pointer; transition: background .25s;
    }
    .seg.done    { background: rgba(34,211,238,.35); }
    .seg.active  { background: var(--accent); }
    .seg.loading { background: rgba(34,211,238,.18); animation: pulse-s .9s ease-in-out infinite; }
    .seg.err     { background: rgba(239,68,68,.4); }
    @keyframes pulse-s { 0%,100% { opacity:.4; } 50% { opacity:1; } }

    /* ── DOWNLOAD ───────────────────────────────────────────── */
    .btn-dl {
      width: 100%; padding: 11px;
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      border-radius: var(--r-sm); color: var(--accent);
      font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background .15s;
      display: none;
    }
    .btn-dl.show { display: block; }
    .btn-dl:hover { background: rgba(34,211,238,.22); }
    .btn-dl:disabled { opacity: .45; cursor: not-allowed; }

    /* ── TOAST ──────────────────────────────────────────────── */
    .toasts {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px; z-index: 999;
      pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      box-shadow: 0 8px 32px rgba(0,0,0,.55);
      animation: t-in .2s ease; max-width: 320px;
      pointer-events: auto;
    }
    .toast.ok   { border-color: rgba(34,197,94,.35); }
    .toast.err  { border-color: rgba(239,68,68,.35); }
    .toast.warn { border-color: rgba(245,158,11,.35); }
    @keyframes t-in { from { transform: translateY(8px); opacity: 0; } }

    /* ── COUNT + REGION ROW ─────────────────────────────────── */
    .form-row-2 { display: grid; grid-template-columns: 100px 1fr; gap: 12px; }
    input[type="number"] {
      width: 100%; background: rgba(0,0,0,.3);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 14px; padding: 10px 12px; outline: none;
      transition: border-color .15s, box-shadow .15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button { opacity: .4; }
    input[type="number"]:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--primary-glow); }

    /* ── CAPTION CARD ───────────────────────────────────────── */
    .caption-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); backdrop-filter: blur(14px);
      padding: 18px 20px;
    }
    .caption-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .caption-title {
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    #caption-text {
      width: 100%; min-height: 200px; max-height: 320px;
      background: rgba(0,0,0,.3); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 13px;
      line-height: 1.6; padding: 12px; outline: none; resize: vertical;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo"><span>Ad</span> Generator</div>
  <nav class="nav">
    <a href="app.html">App Unificado</a>
    <a href="carousel.html" class="active">Carrossel</a>
    <a href="index.html">Criativos</a>
  </nav>
  <div class="api-key-section">
    <span class="api-key-label">Google AI Studio</span>
    <div class="api-key-wrap">
      <input type="password" id="api-key-input" class="api-key-input"
             placeholder="Cole sua API key…" autocomplete="off" spellcheck="false">
      <div class="api-key-status" id="api-key-dot"></div>
    </div>
  </div>
</header>

<main class="main">

  <!-- ── FORM COLUMN ────────────────────── -->
  <div class="form-col">
    <div class="card">
      <p class="card-title">Novo Carrossel</p>
      <form id="gen-form">

        <div class="form-group">
          <label for="in-brand">Nome da marca</label>
          <input type="text" id="in-brand" placeholder="ex: Nazarko Engenharia" autocomplete="off">
        </div>

        <!-- ── TEMA (dual mode) ──────────────────────── -->
        <div class="form-group">
          <label>Tema do carrossel</label>
          <div class="type-toggle" style="margin-bottom:8px">
            <button type="button" class="type-btn idea-mode-btn active" data-mode="manual">Já sei o que criar</button>
            <button type="button" class="type-btn idea-mode-btn" data-mode="ideas">Gerar ideias</button>
          </div>

          <div id="tema-manual">
            <input type="text" id="in-tema"
              placeholder="ex: Como usar IA para automatizar o atendimento da sua agência">
          </div>

          <div id="tema-ideas" style="display:none">
            <button type="button" class="btn-ideas" id="btn-ideas">Gerar ideias</button>
            <div class="ideas-chips" id="ideas-chips"></div>
          </div>
        </div>

        <!-- ── IMAGEM DOS SLIDES ─────────────────────── -->
        <div class="form-group">
          <label>Imagem dos slides</label>
          <div class="type-toggle" style="margin-bottom:0">
            <button type="button" class="type-btn source-btn active" data-source="surprise">Surpreenda-me</button>
            <button type="button" class="type-btn source-btn" data-source="describe">Descrever</button>
            <button type="button" class="type-btn source-btn" data-source="attach">Anexar imagem</button>
          </div>

          <div id="source-describe" class="source-extra" style="display:none">
            <textarea id="in-img-desc" rows="2"
              placeholder="Descreva como quer que as imagens sejam (enquadramento, elementos, atmosfera)…"></textarea>
          </div>

          <div id="source-attach" class="source-extra" style="display:none">
            <input type="file" id="file-img" accept="image/*">
            <button type="button" class="btn-sm" id="btn-attach-img">Selecionar imagem de referência</button>
            <div id="attach-preview"></div>
          </div>
        </div>

        <div class="form-group form-row-2">
          <div>
            <label for="in-count">Nº slides</label>
            <input type="number" id="in-count" min="1" max="15" value="7">
          </div>
          <div>
            <label for="in-region">Contexto regional</label>
            <input type="text" id="in-region" value="Rondônia (RO), Brasil" autocomplete="off">
          </div>
        </div>

        <details class="modifier-details" id="mod-details">
          <summary class="modifier-summary">
            Image Generation Modifier
            <span class="modifier-badge badge-miss" id="mod-badge">Não encontrado</span>
          </summary>
          <div class="modifier-body">
            <textarea id="mod-textarea"
              placeholder="Cole o IMAGE GENERATION PROMPT MODIFIER do brand-dna.md…"></textarea>
            <div class="modifier-actions">
              <button type="button" class="btn-sm" id="btn-load-dna">Carregar brand-dna.md</button>
              <input type="file" id="file-dna" accept=".md">
              <button type="button" class="btn-sm" id="btn-save-mod">Salvar</button>
            </div>
          </div>
        </details>

        <button type="submit" class="btn-gen" id="btn-gen" disabled>Gerar carrossel</button>
        <p class="progress-text hide" id="prog-text">—</p>

      </form>
    </div>

    <div class="cost-panel">
      <span class="cost-label">Custo estimado</span>
      <span class="cost-value" id="cost-val">$0.0000</span>
    </div>
  </div>

  <!-- ── PREVIEW COLUMN ─────────────────── -->
  <div class="preview-col">
    <div class="preview-card">
      <div class="preview-header">
        <span class="preview-title">Preview</span>
        <span class="slide-counter">
          <b id="cnt-cur">—</b> / <span id="cnt-tot">7</span>
        </span>
      </div>

      <div class="empty-state" id="empty-state">
        <span class="ico">🖼️</span>
        <p>Nenhum slide gerado</p>
      </div>

      <div id="carousel-wrap">
        <div class="carousel-vp" id="carousel-vp">
          <div class="carousel-track" id="c-track"></div>
          <button class="cnav cnav-prev hidden" id="nav-prev">‹</button>
          <button class="cnav cnav-next hidden" id="nav-next">›</button>
        </div>
        <div class="carousel-footer">
          <div class="seg-bar" id="seg-bar"></div>
        </div>
      </div>
    </div>

    <button class="btn-dl" id="btn-dl">Baixar todos os slides</button>

    <div class="caption-card" id="caption-card" style="display:none">
      <div class="caption-header">
        <span class="caption-title">Legenda para o Instagram</span>
        <button type="button" class="btn-sm" id="btn-copy-caption">Copiar</button>
      </div>
      <textarea id="caption-text" readonly placeholder="A legenda será gerada após os slides…"></textarea>
    </div>
  </div>

</main>

<div class="toasts" id="toasts"></div>

<script src="carousel.js"></script>
</body>
</html>
